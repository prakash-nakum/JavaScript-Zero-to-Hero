<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../css/common.css" rel="stylesheet" />
    <title>Example 1</title>
  </head>
  <body class="font-mono">
    <div class="flex min-h-screen">
      <div id="layout"></div>
      <main
        class="flex-1 bg-white rounded-2xl shadow-lg p-8 mx-auto w-full h-screen overflow-y-auto no-scrollbar"
      >
        <section class="example">
          <div>
            <h2 class="text-2xl mb-4">Example 1.</h2>
            <input
              type="text"
              placeholder="Enter text"
              oninput="handleInput(this.value)"
              class="w-full border border-gray-400 px-2 py-1 focus:outline-none focus:border-blue-600"
            />
            <p id="enteredText" class="mt-1 text-sm text-green-600"></p>
          </div>
        </section>
      </main>
    </div>
    <script src="../script.js"></script>
    <script src="ex1.js"></script>
  </body>
</html>
