<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../css/common.css" rel="stylesheet" />

    <title>Example 3</title>
  </head>

  <body class="font-mono">
    <div class="flex min-h-screen">
      <div id="layout"></div>
      <main
        class="flex-1 bg-white rounded-2xl shadow-lg p-8 mx-auto w-full h-screen overflow-y-auto no-scrollbar"
      >
        <section class="example">
          <div>
            <h2 class="text-2xl mb-4">Example 3.</h2>
            <span class="mr-2">Price :</span>
            <input
              oninput="handlePriceQty('price', this.value)"
              id="price"
              type="number"
              class="border border-gray-400 px-2 py-1 mr-4"
            />
            <span class="mr-2">Qty :</span>
            <input
              oninput="handlePriceQty('qty', this.value)"
              id="quantity"
              type="number"
              class="border border-gray-400 px-2 py-1"
            />
            <p id="priceqty" class="mt-3">0</p>
          </div>
        </section>
      </main>
    </div>
    <script src="ex3.js"></script>
    <script src="../script.js"></script>
  </body>
</html>
