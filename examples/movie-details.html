<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../css/common.css" rel="stylesheet" />
    <title>Example 13</title>
  </head>
  <body class="font-mono">
    <div class="flex min-h-screen">
      <div id="layout"></div>
      <main
        class="flex-1 bg-white shadow-lg mx-auto w-full h-screen overflow-y-auto no-scrollbar"
      >
        <div id="skeleton" class="shadow rounded-md p-4 mx-auto">
          <div class="animate-pulse flex space-x-4">
            <div class="flex-1 space-y-6 py-1">
              <div class="space-y-3">
                <div class="grid grid-cols-3 gap-4">
                  <div class="h-96 bg-slate-200 rounded"></div>
                  <div class="col-span-2 space-y-2">
                    <div class="h-12 bg-slate-200 rounded"></div>
                    <div class="h-2 bg-slate-200 rounded"></div>
                    <div class="h-10 bg-slate-200 rounded"></div>
                    <div class="h-2 bg-slate-200 rounded"></div>
                    <div class="h-2 bg-slate-200 rounded"></div>
                    <div class="h-40 bg-slate-200 rounded"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <section class="relative h-screen overflow-hidden">
          <div class="absolute inset-0">
            <div
              id="content"
              class="min-h-full p-10 rounded bg-no-repeat bg-cover hidden"
            >
              <div
                class="absolute inset-0 bg-gradient-to-r from-black via-black/80 to-black/40"
              ></div>
              <div class="mb-6 text-white">
                <button
                  onclick="goBack()"
                  class="bg-white/10 text-white backdrop-blur-md px-4 py-2 rounded-lg border border-white/20 hover:bg-white/20 transition"
                >
                  ← Back to Movies
                </button>
              </div>
              <div
                class="relative z-10 grid grid-cols-3 gap-12 p-20 text-white items-center"
              >
                <div>
                  <img
                    id="movie-img"
                    class="w-72 rounded-xl shadow-2xl border hover:scale-105 duration-500"
                    src=""
                    alt=""
                  />
                </div>
                <div class="col-span-2">
                  <h1 class="text-5xl font-bold mb-4 flex items-center">
                    <span id="movie-title"></span>
                    <span
                      id="movie-year"
                      class="ml-4 text-sm bg-green-500 px-3 py-1 rounded-md font-medium"
                    ></span>
                  </h1>
                  <div class="flex items-center space-x-6 mb-6">
                    <div
                      class="bg-white/10 backdrop-blur-lg px-6 py-3 rounded-xl border border-white/20"
                    >
                      ⭐
                      <span id="vote_average" class="font-bold text-lg"></span
                      >/10
                      <span class="text-sm text-gray-300 ml-2"
                        >(<span id="vote_count"></span> votes)</span
                      >
                    </div>

                    <button
                      class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-lg font-semibold transition duration-300 shadow-lg"
                    >
                      Book Tickets
                    </button>
                  </div>
                  <div class="text-gray-300 mb-6 space-x-4">
                    <span id="release_date"></span>
                    <span id="genres"></span>
                  </div>
                  <p id="tagline" class="italic text-lg text-gray-400 mb-4"></p>
                  <h3 class="font-bold text-xl mb-2">Overview</h3>
                  <p
                    id="overview"
                    class="text-gray-300 leading-relaxed max-w-3xl"
                  ></p>
                  <div class="flex space-x-16 mt-8 text-sm">
                    <div>
                      <span class="text-gray-400">Runtime</span><br />
                      <span
                        id="runtime"
                        class="font-semibold text-white"
                      ></span>
                    </div>

                    <div>
                      <span class="text-gray-400">Adult</span><br />
                      <span id="adult" class="font-semibold text-white"></span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="../script.js"></script>
    <script src="movie-details.js"></script>
  </body>
</html>
