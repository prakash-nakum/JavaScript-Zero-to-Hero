<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="../css/common.css" rel="stylesheet" />

    <title>Example 2</title>
  </head>
  <body class="font-mono">
    <div class="flex min-h-screen">
      <div id="layout"></div>
      <main
        class="flex-1 bg-white rounded-2xl shadow-lg p-8 mx-auto w-full h-screen overflow-y-auto no-scrollbar"
      >
        <section class="example">
          <div>
            <h2 class="text-2xl mb-4">Example 2.</h2>
            <p id="showhide" class="mb-4">
              Using below button you can show/hide me
            </p>
            <button
              class="px-3 py-1 border rounded-sm border-blue-600 text-blue-600 mr-2 hover:bg-blue-600 hover:text-white"
              onclick="handleShowHide('hide')"
            >
              Hide the text above
            </button>
            <button
              class="px-3 py-1 border rounded-sm border-blue-600 text-blue-600 mr-2 hover:bg-blue-600 hover:text-white"
              onclick="handleShowHide('show')"
            >
              Show the text above
            </button>
          </div>
        </section>
      </main>
    </div>
    <script src="ex2.js"></script>
    <script src="../script.js"></script>
  </body>
</html>
