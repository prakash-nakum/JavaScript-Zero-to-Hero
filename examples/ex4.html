<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../css/common.css" rel="stylesheet" />

    <title>Example 4</title>
  </head>

  <body class="font-mono">
    <div class="flex min-h-screen">
      <div id="layout"></div>
      <main
        class="flex-1 bg-white rounded-2xl shadow-lg p-8 mx-auto w-full h-screen overflow-y-auto no-scrollbar"
      >
        <section class="example">
          <div>
            <h2 class="text-2xl mb-4">Example 4.</h2>
            <div class="flex items-center">
              <div class="mr-4">
                <input
                  oninput="handleCelFah('celsius', this.value)"
                  id="celsius"
                  type="number"
                  class="border border-gray-400 px-2 py-1 w-32"
                />
                <div class="text-sm mt-1">Celsius</div>
              </div>
              <span class="mx-2">=</span>
              <div>
                <input
                  oninput="handleCelFah('fahrentheit', this.value)"
                  id="fahrentheit"
                  type="number"
                  class="border border-gray-400 px-2 py-1 w-32"
                />
                <div class="text-sm mt-1">Fahrentheit</div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="ex4.js"></script>
    <script src="../script.js"></script>
  </body>
</html>
