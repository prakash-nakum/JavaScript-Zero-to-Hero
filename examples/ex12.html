<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../css/common.css" rel="stylesheet" />

    <title>Example 12</title>
  </head>

  <body class="font-mono">
    <div class="flex min-h-screen">
      <div id="layout"></div>
      <main
        class="flex-1 bg-white rounded-2xl shadow-lg p-8 mx-auto w-full h-screen overflow-y-auto no-scrollbar"
      >
        <p>Select country</p>
        <section class="example">
          <select
            id="country-dropdown"
            class="cursor-pointer hover:border-2 bg-white hover:bg-slate-200 min-w-full border-2 border-blue-500 rounded hover:border-blue-800 px-2 py-2 mb-4"
            onchange="handleState(this)"
          ></select>
        </section>
        <p>Select state</p>
        <section class="example">
          <select
            id="states-dropdown"
            class="cursor-pointer hover:border-2 bg-white hover:bg-slate-200 min-w-full border-2 border-blue-500 rounded hover:border-blue-800 px-2 py-2 mb-4"
            onchange="handleCity(this)"
          ></select>
        </section>
        <p>Select city</p>
        <section class="example">
          <select
            id="city-dropdown"
            class="cursor-pointer hover:border-2 bg-white hover:bg-slate-200 min-w-full border-2 border-blue-500 rounded hover:border-blue-800 px-2 py-2 mb-4"
          ></select>
        </section>
      </main>
    </div>

    <script src="../script.js"></script>
    <script src="ex12.js"></script>
  </body>
</html>
